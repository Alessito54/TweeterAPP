# ===========================
# DATABASE CONFIGURATION (AIVEN PostgreSQL)
# ===========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/defaultdb?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:defaultuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:defaultpass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:10000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:30000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.initialization-fail-timeout=${DB_INIT_FAIL_TIMEOUT_MS:-1}

# ===========================
# JPA / HIBERNATE CONFIGURATION
# ===========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.connection.connect_timeout=5
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.sql.init.mode=never

# ===========================
# SERVER CONFIGURATION
# ===========================
server.port=${PORT:8080}
server.servlet.context-path=/

# ===========================
# LOGGING
# ===========================
logging.level.root=INFO
logging.level.com.tweeter=DEBUG
logging.level.org.springframework.web=INFO
