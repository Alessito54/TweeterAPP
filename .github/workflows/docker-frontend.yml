name: Build and Push Frontend Image

on:
  push:
    branches: ["main"]
    paths:
      - "flutter_client/**"
      - ".github/workflows/docker-frontend.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./flutter_client
          file: ./flutter_client/Dockerfile
          push: true
          build-args: |
            API_BASE_URL=${{ secrets.API_BASE_URL || 'https://tweeter-v1-0-0.onrender.com/api' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/tweeter-web:latest
            ghcr.io/${{ github.repository_owner }}/tweeter-web:${{ github.sha }}
